# Nixpacks için opsiyonel konfig. Railway bu dosyayı otomatik alır.
[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npx prisma migrate deploy || npx prisma db push --accept-data-loss",
  "npx next build"
]

[start]
cmd = "npm run start"
